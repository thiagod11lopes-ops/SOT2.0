# Build do APK Android (Capacitor) e publicação numa release "android-latest" do GitHub.
# - Disparo manual: aba Actions → "Build Android APK" → Run workflow (na branch que quiseres).
# - Disparo automático: ao fazer push de uma tag `v*` (ex.: `git tag v1.0.0 && git push --tags`).
# O APK final fica em https://github.com/<owner>/<repo>/releases/download/android-latest/sot-saidas-android.apk
# (URL estável usado pelo botão "Descarregar APK" da página de Configurações).

name: Build Android APK

# Runtime JavaScript das ações oficiais (checkout, cache, setup-node, etc.): migração Node 20 → 24.
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: android-apk
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # @capacitor/cli 8.x exige Node >= 22 (engines.node). Sem isto, `cap sync` falha
      # silenciosamente ao tentar carregar `capacitor.config.ts`.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install npm dependencies
        run: npm ci

      # Os mesmos segredos usados no deploy do site são injectados aqui, para que a build
      # do bundle web (que vai dentro do APK) saiba falar com o Firebase em tempo real.
      - name: Build web bundle for Capacitor
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_DRIVER_LOCATION_POST_URL: ${{ secrets.VITE_DRIVER_LOCATION_POST_URL }}
        run: npm run build:capacitor

      - name: Diagnose build output
        run: |
          set -eux
          node --version
          npx cap --version
          echo "=== Configs Capacitor presentes ==="
          ls -la capacitor.config.* 2>&1 || true
          echo "=== dist-capacitor (top-level) ==="
          ls -la dist-capacitor
          echo "=== dist-capacitor/index.html (primeiras linhas) ==="
          head -n 5 dist-capacitor/index.html || true
          echo "=== Capacitor packages instalados ==="
          npm ls @capacitor/core @capacitor/cli @capacitor/android @capacitor-community/background-geolocation || true

      # Captura o output independentemente de sucesso para podermos diagnosticar caso falhe.
      # NOTA: `cap sync` não aceita `--verbose`. Para mais detalhe usa CAPACITOR_LOG_LEVEL=debug.
      - name: Capacitor sync (com log capturado)
        id: capsync
        env:
          CAPACITOR_LOG_LEVEL: debug
        run: |
          set -o pipefail
          npx cap sync android 2>&1 | tee cap-sync.log
        continue-on-error: true

      - name: Mostrar cap-sync.log
        if: always()
        run: |
          echo "=== cap-sync.log (últimas 200 linhas) ==="
          tail -n 200 cap-sync.log || echo "Sem ficheiro cap-sync.log"

      - name: Upload cap-sync.log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cap-sync-log
          path: cap-sync.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Falhar se cap sync deu erro
        if: steps.capsync.outcome != 'success'
        run: |
          echo "::error::cap sync android falhou — ver passo 'Mostrar cap-sync.log' acima ou descarregar o artefacto cap-sync-log."
          exit 1

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --console=plain

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk sot-saidas-android.apk

      - name: Show APK size
        run: ls -lh sot-saidas-android.apk

      - name: Upload artifact (download via Actions)
        uses: actions/upload-artifact@v4
        with:
          name: sot-saidas-android-apk
          path: sot-saidas-android.apk
          retention-days: 14

      # Mantém uma release "android-latest" sempre actualizada com o APK mais recente —
      # esse é o URL público estável que o botão na app usa.
      - name: Publicar/actualizar release android-latest
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: SOT Saídas — Android (latest)
          body: |
            Build automática do app **SOT Saídas** para Android.

            **Instalação:**
            1. Descarrega o `sot-saidas-android.apk` para o telemóvel (botão na Configurações → "Mobile — rastreamento (GPS)").
            2. Toca no ficheiro descarregado. O Android pergunta se permites instalar de fontes desconhecidas — autoriza para o browser/WhatsApp.
            3. Conclui a instalação e abre o app.
            4. Concede a permissão de localização como **"Permitir o tempo todo"** e activa as notificações.

            Para enviar a colegas: WhatsApp como **Documento**, ou Drive/email.
          files: sot-saidas-android.apk
          make_latest: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Se vier de um tag vX.Y.Z, também publica uma release versionada (não-latest).
      - name: Publicar release versionada (apenas em push de tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SOT Saídas — ${{ github.ref_name }}
          files: sot-saidas-android.apk
          generate_release_notes: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
